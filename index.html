<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตามหาคำใบ้พี่รหัส 🕵️‍♂️</title>
    <style>
        /* CSS สำหรับตกแต่งหน้าเว็บ */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.19), 0 6px 6px rgba(0,0,0,0.23);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #2d3436;
            margin-bottom: 20px;
            font-size: 24px;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px 20px;
            margin: 8px 0;
            box-sizing: border-radius;
            border: 2px solid #ccc;
            border-radius: 25px;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: #6c5ce7;
        }

        button {
            background-color: #6c5ce7;
            color: white;
            padding: 12px 28px;
            margin: 10px 0;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: #5b4bc4;
            transform: scale(1.05);
        }

        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            background-color: #f1f2f6;
            display: none; /* ซ่อนไว้ก่อนจนกว่าจะกดค้นหา */
            animation: fadeIn 0.5s;
        }

        .hint-text {
            font-size: 18px;
            color: #ff7675;
            font-weight: bold;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔍 ตามหาคำใบ้พี่รหัส</h1>
        <p>กรอกรหัสนิสิตของคุณเพื่อดูคำใบ้</p>
        
        <input type="text" id="studentId" placeholder="ตัวอย่าง: 66010203" autocomplete="off">
        <br>
        <button onclick="findHint()">ดูคำใบ้ของฉัน</button>

        <div id="resultBox" class="result-box">
            <h3 style="margin-top: 0; color: #2d3436;">คำใบ้ของคุณคือ:</h3>
            <p id="hintDisplay" class="hint-text"></p>
        </div>
    </div>

    <script>
        // 1. Database จำลอง: แก้ไขรหัสนิสิตและคำใบ้ตรงนี้ได้เลยครับ
        const hintData = {
            "66010101": "ชอบกินชาเขียวหวานน้อย และใส่แว่นหนาๆ 🍵",
            "66010102": "คนที่คุณก็รู้ว่าใคร... ที่ชอบมาสายที่สุดในเซค ⏰",
            "66010103": "พี่รหัสเราตัวสูงๆ ชอบเล่นบาสเกตบอล 🏀",
            "66010104": "แมวส้มตัวนั้นที่ชอบนอนหน้าตึกคณะนั่นแหละพี่เอง 🐱"
        };index.html

        // 2. ฟังก์ชันค้นหาคำใบ้
        function findHint() {
            // ดึงค่าจากช่องกรอกข้อมูล และตัดช่องว่างออก
            const inputId = document.getElementById("studentId").value.trim();
            const resultBox = document.getElementById("resultBox");
            const hintDisplay = document.getElementById("hintDisplay");

            // ตรวจสอบว่าได้กรอกข้อมูลไหม
            if (inputId === "") {
                alert("กรุณากรอกรหัสนิสิตก่อนนะจ๊ะ!");
                return;
            }

            // ค้นหาคำใบ้จาก Database
            if (hintData[inputId]) {
                // ถ้าเจอข้อมูล
                hintDisplay.innerText = hintData[inputId];
                resultBox.style.display = "block"; // แสดงกล่องข้อความ
            } else {
                // ถ้าไม่เจอข้อมูล
                hintDisplay.innerText = "❌ ไม่พบข้อมูลรหัสนี้ในระบบ (ลองเช็คเลขดูอีกทีนะ หรือหนูอาจจะยังไม่มีพี่รหัส 🤔)";
                resultBox.style.display = "block";
            }
        }
    </script>

</body>
</html>
